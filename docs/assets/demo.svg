<text x="353" y="22" fill="#8b949e" text-anchor="middle">prpt — PromptPilot demo</text>
<text x="22" y="56"><tspan fill="#7ee787" xml:space="preserve">$ </tspan><tspan fill="#c9d1d9" xml:space="preserve">python examples/demo.py</tspan></text>
<text x="22" y="102"><tspan fill="#56d4dd" xml:space="preserve">RAW PROMPT</tspan></text>
<text x="22" y="125"><tspan fill="#8b949e" xml:space="preserve">  the OrderSyncWorker keeps timing out under load and dropping events. find</tspan></text>
<text x="22" y="148"><tspan fill="#8b949e" xml:space="preserve">  the root cause and fix the timeout. do not change the public API, keep the</tspan></text>
<text x="22" y="171"><tspan fill="#8b949e" xml:space="preserve">  DB schema backward compatible, and ship a minimal patch with a regression</tspan></text>
<text x="22" y="194"><tspan fill="#8b949e" xml:space="preserve">  test in tests/test_worker.py.</tspan></text>
<text x="22" y="240"><tspan fill="#56d4dd" xml:space="preserve">PROMPTPILOT  </tspan><tspan fill="#8b949e" xml:space="preserve">route=</tspan><tspan fill="#d2a8ff" xml:space="preserve">act</tspan><tspan fill="#8b949e" xml:space="preserve">  task=</tspan><tspan fill="#d2a8ff" xml:space="preserve">root_cause_analysis</tspan><tspan fill="#8b949e" xml:space="preserve">  confidence=</tspan><tspan fill="#d2a8ff" xml:space="preserve">high</tspan></text>
<text x="22" y="286"><tspan fill="#56d4dd" xml:space="preserve">EXTRACTED</tspan></text>
<text x="22" y="309"><tspan fill="#8b949e" xml:space="preserve">  protected spans   </tspan><tspan fill="#c9d1d9" xml:space="preserve">minimal patch</tspan></text>
<text x="22" y="332"><tspan fill="#8b949e" xml:space="preserve">                    </tspan><tspan fill="#c9d1d9" xml:space="preserve">backward compatible</tspan></text>
<text x="22" y="355"><tspan fill="#8b949e" xml:space="preserve">                    </tspan><tspan fill="#c9d1d9" xml:space="preserve">root cause</tspan></text>
<text x="22" y="378"><tspan fill="#8b949e" xml:space="preserve">                    </tspan><tspan fill="#c9d1d9" xml:space="preserve">OrderSyncWorker</tspan></text>
<text x="22" y="401"><tspan fill="#8b949e" xml:space="preserve">                    </tspan><tspan fill="#8b949e" xml:space="preserve">(+3 more)</tspan></text>
<text x="22" y="424"><tspan fill="#8b949e" xml:space="preserve">  hard constraints  </tspan><tspan fill="#c9d1d9" xml:space="preserve">fix the timeout. do not change the public API</tspan></text>
<text x="22" y="447"><tspan fill="#8b949e" xml:space="preserve">                    </tspan><tspan fill="#c9d1d9" xml:space="preserve">keep the DB schema backward compatible</tspan></text>
<text x="22" y="470"><tspan fill="#8b949e" xml:space="preserve">                    </tspan><tspan fill="#c9d1d9" xml:space="preserve">ship a minimal patch with a regression test in tests/te...</tspan></text>
<text x="22" y="493"><tspan fill="#8b949e" xml:space="preserve">                    </tspan><tspan fill="#8b949e" xml:space="preserve">(+2 more)</tspan></text>
<text x="22" y="539"><tspan fill="#7ee787" xml:space="preserve">&gt; structured prompt forwarded to the coding agent </tspan><tspan fill="#8b949e" xml:space="preserve">(constraints pinned first)</tspan></text>
</svg>
