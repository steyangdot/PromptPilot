<text x="28" y="44" fill="#c9d1d9" font-size="26" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="800">PromptPilot visual demo</text>
<text x="28" y="72" fill="#8b949e" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">A vague ask becomes a precise brief — it asks one sharp question first, instead of burning an agent run on a guess.</text>
