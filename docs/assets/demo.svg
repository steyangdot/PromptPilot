<text x="32" y="42" fill="#c9d1d9" font-size="26" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="800">PromptPilot visual demo</text>
<text x="32" y="68" fill="#8b949e" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">Rough request in → constraint-pinned coding-agent brief out</text>
<rect x="880" y="24" width="128" height="28" rx="14" fill="#7ee787" fill-opacity="0.13" stroke="#7ee787" stroke-opacity="0.55"/>
<text x="944" y="43" fill="#7ee787" font-size="12" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700" text-anchor="middle">zero setup</text>
<rect x="738" y="24" width="130" height="28" rx="14" fill="#58a6ff" fill-opacity="0.13" stroke="#58a6ff" stroke-opacity="0.55"/>
<text x="803" y="43" fill="#58a6ff" font-size="12" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700" text-anchor="middle">offline demo</text>
<rect x="32" y="86" width="476" height="550" rx="16" fill="#161b22" stroke="#30363d"/>
<rect x="32" y="86" width="476" height="5" rx="2.5" fill="#ffa657"/>
<text x="54" y="120" fill="#c9d1d9" font-size="18" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700">Before</text>
<text x="54" y="144" fill="#8b949e" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">A normal run-on developer prompt</text>
<rect x="532" y="86" width="476" height="550" rx="16" fill="#161b22" stroke="#30363d"/>
<rect x="532" y="86" width="476" height="5" rx="2.5" fill="#7ee787"/>
<text x="554" y="120" fill="#c9d1d9" font-size="18" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700">After PromptPilot</text>
<text x="554" y="144" fill="#8b949e" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">A routed brief with constraints pinned first</text>
<line x1="514" y1="336" x2="526" y2="336" stroke="#58a6ff" stroke-width="3"/>
<path d="M 522 329 L 534 336 L 522 343" fill="none" stroke="#58a6ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<text x="54" y="182" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">$ </tspan><tspan fill="#c9d1d9" xml:space="preserve">python examples/demo.py</tspan></text>
<text x="54" y="228" fill="#56d4dd" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="800">RAW PROMPT</text>
<text x="54" y="254" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">the OrderSyncWorker keeps timing out under load and</text>
<text x="54" y="276" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">dropping events. find the root cause and fix the</text>
<text x="54" y="298" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">timeout. do not change the public API, keep the DB</text>
<text x="54" y="320" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">schema backward compatible, and ship a minimal patch</text>
<text x="54" y="342" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">with a regression test in tests/test_worker.py.</text>
<text x="54" y="388" fill="#8b949e" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">What the agent otherwise has to infer</text>
<text x="54" y="418" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#e3b341" xml:space="preserve">? </tspan><tspan fill="#c9d1d9" xml:space="preserve">Which facts are hard constraints?</tspan></text>
<text x="54" y="440" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#e3b341" xml:space="preserve">? </tspan><tspan fill="#c9d1d9" xml:space="preserve">Which symbols / paths must survive?</tspan></text>
<text x="54" y="462" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#e3b341" xml:space="preserve">? </tspan><tspan fill="#c9d1d9" xml:space="preserve">Should it ask, answer, pass through, or act?</tspan></text>
<text x="554" y="182" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">route=</tspan><tspan fill="#d2a8ff" xml:space="preserve">act</tspan><tspan fill="#8b949e" xml:space="preserve">  task=</tspan><tspan fill="#d2a8ff" xml:space="preserve">root_cause_analysis</tspan><tspan fill="#8b949e" xml:space="preserve">  confidence=</tspan><tspan fill="#d2a8ff" xml:space="preserve">high</tspan></text>
<text x="554" y="224" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#56d4dd" xml:space="preserve">PROTECTED SPANS</tspan></text>
<text x="554" y="246" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">minimal patch</tspan></text>
<text x="554" y="268" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">backward compatible</tspan></text>
<text x="554" y="290" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">root cause</tspan></text>
<text x="554" y="312" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">OrderSyncWorker</tspan></text>
<text x="554" y="346" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#56d4dd" xml:space="preserve">HARD CONSTRAINTS</tspan></text>
<text x="554" y="368" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">fix the timeout. do not change the public</tspan></text>
<text x="554" y="390" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">    </tspan><tspan fill="#c9d1d9" xml:space="preserve">API</tspan></text>
<text x="554" y="412" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">keep the DB schema backward compatible</tspan></text>
<text x="554" y="434" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">ship a minimal patch with a regression test</tspan></text>
<text x="554" y="456" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">    </tspan><tspan fill="#c9d1d9" xml:space="preserve">in tests/test_worker.py.</tspan></text>
<text x="554" y="494" fill="#56d4dd" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="800">FORWARDED BRIEF PREVIEW</text>
<rect x="544" y="500" width="432" height="118" rx="10" fill="#0f172a" stroke="#2563eb" stroke-opacity="0.45"/>
<text x="554" y="518" fill="#c9d1d9" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#58a6ff" xml:space="preserve">Original user request:</tspan></text>
<text x="554" y="538" fill="#c9d1d9" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">the OrderSyncWorker keeps timing out under load</tspan></text>
<text x="554" y="558" fill="#c9d1d9" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">  and dropping events. find the root cause and fix</tspan></text>
<text x="554" y="578" fill="#c9d1d9" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">  the timeout. do not change the public API, keep</tspan></text>
<text x="554" y="598" fill="#c9d1d9" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">  the DB schema backward compatible, and ship a</tspan></text>
<rect x="32" y="640" width="976" height="40" rx="20" fill="#052e2b" fill-opacity="0.85" stroke="#7ee787" stroke-opacity="0.45"/>
<text x="56" y="665" fill="#c9d1d9" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif"><tspan fill="#7ee787" xml:space="preserve">✓ </tspan><tspan fill="#c9d1d9" xml:space="preserve">Clarifies ambiguity, preserves APIs / paths, and bounds context before the expensive coding agent runs.</tspan></text>
</svg>
