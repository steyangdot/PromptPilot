<rect x="532" y="86" width="476" height="5" rx="2.5" fill="#7ee787"/>
<text x="554" y="120" fill="#c9d1d9" font-size="18" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700">After PromptPilot</text>
<text x="554" y="144" fill="#8b949e" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">Rewritten by the small model, forwarded to the agent</text>
<line x1="514" y1="306" x2="526" y2="306" stroke="#58a6ff" stroke-width="3"/>
<path d="M 522 299 L 534 306 L 522 313" fill="none" stroke="#58a6ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<text x="54" y="182" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">$ </tspan><tspan fill="#c9d1d9" xml:space="preserve">prpt --slm &lt; prompt.txt</tspan></text>
<text x="54" y="228" fill="#56d4dd" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="800">RAW PROMPT</text>
<text x="54" y="254" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">the OrderSyncWorker keeps timing out under load and</text>
<text x="54" y="276" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">dropping events. find the root cause and fix the</text>
<text x="54" y="298" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">timeout. do not change the public API, keep the DB</text>
<text x="54" y="320" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">schema backward compatible, and ship a minimal patch</text>
<text x="54" y="342" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">with a regression test in tests/test_worker.py.</text>
<text x="54" y="388" fill="#8b949e" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">What the agent otherwise has to infer</text>
<text x="54" y="418" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#e3b341" xml:space="preserve">? </tspan><tspan fill="#c9d1d9" xml:space="preserve">Which facts are hard constraints?</tspan></text>
<text x="54" y="440" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#e3b341" xml:space="preserve">? </tspan><tspan fill="#c9d1d9" xml:space="preserve">Which symbols / paths must survive?</tspan></text>
<text x="54" y="462" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#e3b341" xml:space="preserve">? </tspan><tspan fill="#c9d1d9" xml:space="preserve">Should it ask, answer, pass through, or act?</tspan></text>
<text x="554" y="182" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">route=</tspan><tspan fill="#d2a8ff" xml:space="preserve">act</tspan><tspan fill="#8b949e" xml:space="preserve">  task=</tspan><tspan fill="#d2a8ff" xml:space="preserve">root_cause_analysis</tspan><tspan fill="#8b949e" xml:space="preserve">  confidence=</tspan><tspan fill="#d2a8ff" xml:space="preserve">high</tspan></text>
<text x="554" y="210" fill="#8b949e" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">▼ small-model rewrite, forwarded to the coding agent</text>
<text x="554" y="238" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">Investigate why OrderSyncWorker times out and</tspan></text>
<text x="554" y="260" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">drops events under load. Identify and fix the root</tspan></text>
<text x="554" y="282" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">cause with a minimal patch that:</tspan></text>
<text x="554" y="304" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">Does not modify the public API</tspan></text>
<text x="554" y="326" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">Maintains DB schema backward compatibility</tspan></text>
<text x="554" y="348" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">Includes a regression test in</tspan></text>
<text x="554" y="370" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">    </tspan><tspan fill="#c9d1d9" xml:space="preserve">tests/test_worker.py that reproduces the time…</tspan></text>
<text x="554" y="402" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">Provide the patch and test together.</tspan></text>
<text x="554" y="424" fill="#c9d1d9" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">[cwd=/home/dev/payments-api; Python; branch=main;</tspan></text>
<text x="554" y="446" fill="#c9d1d9" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">tests=pytest; changed: sync/order_worker.py,</tspan></text>
<text x="554" y="468" fill="#c9d1d9" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">tests/test_worker.py]</tspan></text>
