<text x="52" y="251" fill="#e3b341" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="800" text-anchor="middle">2</text>
<text x="106" y="248" fill="#c9d1d9" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700">PromptPilot  ·  asks instead of guessing</text>
<rect x="868" y="233" width="86" height="24" rx="12" fill="#e3b341" fill-opacity="0.14" stroke="#e3b341" stroke-opacity="0.55"/>
<text x="911" y="249" fill="#e3b341" font-size="12" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700" text-anchor="middle">route=clarify</text>
<text x="106" y="270" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">Which checkout page performance issue should I focus on?</tspan></text>
<text x="106" y="308" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#56d4dd" xml:space="preserve">  A) </tspan><tspan fill="#c9d1d9" xml:space="preserve">Frontend rendering / JavaScript performance</tspan></text>
<text x="106" y="330" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#56d4dd" xml:space="preserve">  B) </tspan><tspan fill="#c9d1d9" xml:space="preserve">Backend API response times</tspan></text>
<text x="106" y="352" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#56d4dd" xml:space="preserve">  C) </tspan><tspan fill="#c9d1d9" xml:space="preserve">Database queries or N+1 problems</tspan></text>
<text x="106" y="374" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#56d4dd" xml:space="preserve">  D) </tspan><tspan fill="#c9d1d9" xml:space="preserve">Asset loading (images, bundles, etc.)</tspan></text>
<text x="106" y="396" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#56d4dd" xml:space="preserve">  E) </tspan><tspan fill="#c9d1d9" xml:space="preserve">Unsure — analyze the full checkout flow</tspan></text>
<text x="106" y="434" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">Also: Do you have performance metrics or profiling data (load time, bottleneck)? If not,</tspan></text>
<text x="106" y="456" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">I'll audit the full checkout flow.</tspan></text>
<line x1="52" y1="496" x2="52" y2="522" stroke="#6e7681" stroke-width="2"/>
<path d="M 47 515 L 52 522 L 57 515" fill="none" stroke="#6e7681" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="88" y="518" fill="#8b949e" font-size="12" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">you answer in one line</text>
<rect x="88" y="526" width="884" height="106" rx="14" fill="#161b22" stroke="#30363d"/>
<rect x="88" y="526" width="5" height="106" rx="2.5" fill="#58a6ff"/>
<circle cx="52" cy="550" r="14" fill="#58a6ff" fill-opacity="0.16" stroke="#58a6ff" stroke-opacity="0.7"/>
<text x="52" y="555" fill="#58a6ff" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="800" text-anchor="middle">3</text>
<text x="106" y="552" fill="#c9d1d9" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700">You answer</text>
<text x="106" y="574" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">checkout p95 is ~3s; api/checkout.py runs an N+1 DB query per line item. don't change the</tspan></text>
<text x="106" y="596" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">public API or behavior, and add a regression/benchmark test.</tspan></text>
<line x1="52" y1="636" x2="52" y2="662" stroke="#6e7681" stroke-width="2"/>
<path d="M 47 655 L 52 662 L 57 655" fill="none" stroke="#6e7681" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="88" y="658" fill="#8b949e" font-size="12" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">PromptPilot routes the request</text>
<rect x="88" y="666" width="884" height="232" rx="14" fill="#161b22" stroke="#30363d"/>
<rect x="88" y="666" width="5" height="232" rx="2.5" fill="#7ee787"/>
<circle cx="52" cy="690" r="14" fill="#7ee787" fill-opacity="0.16" stroke="#7ee787" stroke-opacity="0.7"/>
<text x="52" y="695" fill="#7ee787" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="800" text-anchor="middle">4</text>
<text x="106" y="692" fill="#c9d1d9" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700">PromptPilot  ·  forwards a precise brief to the coding agent</text>
<rect x="868" y="677" width="86" height="24" rx="12" fill="#7ee787" fill-opacity="0.14" stroke="#7ee787" stroke-opacity="0.55"/>
<text x="911" y="693" fill="#7ee787" font-size="12" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700" text-anchor="middle">route=act</text>
<text x="106" y="714" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">task=</tspan><tspan fill="#d2a8ff" xml:space="preserve">bug_fix</tspan><tspan fill="#8b949e" xml:space="preserve">   confidence=</tspan><tspan fill="#d2a8ff" xml:space="preserve">medium</tspan></text>
<text x="106" y="752" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">Fix N+1 database queries in api/checkout.py that are causing checkout p95 latency ~3s.</tspan></text>
<text x="106" y="774" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">Optimize queries to fetch line item relationships efficiently (e.g., use select_related or</tspan></text>
<text x="106" y="796" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">prefetch_related). Do not change the public API signature or checkout behavior. Add a</tspan></text>
<text x="106" y="818" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">regression/benchmark test to prevent future N+1 regressions.</tspan></text>
<text x="106" y="840" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">[cwd=/home/dev/payments-api; Python; branch=main; tests=pytest; changed: api/checkout.py,</tspan></text>
<text x="106" y="862" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">tests/test_checkout.py]</tspan></text>
<rect x="88" y="920" width="884" height="44" rx="14" fill="#052e2b" fill-opacity="0.85" stroke="#7ee787" stroke-opacity="0.45"/>
<text x="108" y="947" fill="#c9d1d9" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif"><tspan fill="#7ee787" xml:space="preserve">✓ </tspan><tspan fill="#c9d1d9" xml:space="preserve">A vague ask earns one sharp question — not a wrong guess — then a constraint-pinned brief, forwarded to the agent once.</tspan></text>
