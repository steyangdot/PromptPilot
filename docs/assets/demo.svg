<text x="554" y="144" fill="#8b949e" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">The structured brief forwarded to the agent</text>
<line x1="514" y1="336" x2="526" y2="336" stroke="#58a6ff" stroke-width="3"/>
<path d="M 522 329 L 534 336 L 522 343" fill="none" stroke="#58a6ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<text x="54" y="182" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">$ </tspan><tspan fill="#c9d1d9" xml:space="preserve">python examples/demo.py</tspan></text>
<text x="54" y="228" fill="#56d4dd" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="800">RAW PROMPT</text>
<text x="54" y="254" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">the OrderSyncWorker keeps timing out under load and</text>
<text x="54" y="276" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">dropping events. find the root cause and fix the</text>
<text x="54" y="298" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">timeout. do not change the public API, keep the DB</text>
<text x="54" y="320" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">schema backward compatible, and ship a minimal patch</text>
<text x="54" y="342" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">with a regression test in tests/test_worker.py.</text>
<text x="54" y="388" fill="#8b949e" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">What the agent otherwise has to infer</text>
<text x="54" y="418" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#e3b341" xml:space="preserve">? </tspan><tspan fill="#c9d1d9" xml:space="preserve">Which facts are hard constraints?</tspan></text>
<text x="54" y="440" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#e3b341" xml:space="preserve">? </tspan><tspan fill="#c9d1d9" xml:space="preserve">Which symbols / paths must survive?</tspan></text>
<text x="54" y="462" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#e3b341" xml:space="preserve">? </tspan><tspan fill="#c9d1d9" xml:space="preserve">Should it ask, answer, pass through, or act?</tspan></text>
<text x="554" y="182" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">route=</tspan><tspan fill="#d2a8ff" xml:space="preserve">act</tspan><tspan fill="#8b949e" xml:space="preserve">  task=</tspan><tspan fill="#d2a8ff" xml:space="preserve">root_cause_analysis</tspan><tspan fill="#8b949e" xml:space="preserve">  confidence=</tspan><tspan fill="#d2a8ff" xml:space="preserve">high</tspan></text>
<text x="554" y="210" fill="#8b949e" font-size="13" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif">▼ forwarded to the coding agent (structured brief)</text>
<text x="554" y="240" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#56d4dd" xml:space="preserve">Objective:</tspan></text>
<text x="554" y="262" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">  </tspan><tspan fill="#c9d1d9" xml:space="preserve">Analyze and explain the likely root cause.</tspan></text>
<text x="554" y="292" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#56d4dd" xml:space="preserve">Hard constraints:</tspan></text>
<text x="554" y="314" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">fix the timeout. do not change the public API</tspan></text>
<text x="554" y="336" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">keep the DB schema backward compatible</tspan></text>
<text x="554" y="358" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">  • </tspan><tspan fill="#c9d1d9" xml:space="preserve">ship a minimal patch with a regression test in</tspan></text>
<text x="554" y="380" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#7ee787" xml:space="preserve">    </tspan><tspan fill="#c9d1d9" xml:space="preserve">tests/test_worker.py.</tspan></text>
<text x="554" y="402" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">  </tspan><tspan fill="#8b949e" xml:space="preserve">(+2 more)</tspan></text>
<text x="554" y="432" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#56d4dd" xml:space="preserve">Protected spans:</tspan></text>
<text x="554" y="454" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">  </tspan><tspan fill="#c9d1d9" xml:space="preserve">minimal patch  backward compatible  root cause</tspan></text>
<text x="554" y="476" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#8b949e" xml:space="preserve">  </tspan><tspan fill="#c9d1d9" xml:space="preserve">OrderSyncWorker  API  DB  tests/test_worker.py</tspan></text>
<text x="554" y="506" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#56d4dd" xml:space="preserve">Instruction to downstream model:</tspan></text>
<text x="554" y="528" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">  </tspan><tspan fill="#c9d1d9" xml:space="preserve">If there is any conflict between the structured</tspan></text>
<text x="554" y="550" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">  </tspan><tspan fill="#c9d1d9" xml:space="preserve">interpretation and the original user request, fol…</tspan></text>
<rect x="32" y="620" width="976" height="40" rx="20" fill="#052e2b" fill-opacity="0.85" stroke="#7ee787" stroke-opacity="0.45"/>
<text x="56" y="645" fill="#c9d1d9" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif"><tspan fill="#7ee787" xml:space="preserve">✓ </tspan><tspan fill="#c9d1d9" xml:space="preserve">Same request, re-expressed as a labeled brief — objective, pinned constraints, and protected spans — before the expensive coding agent runs.</tspan></text>
