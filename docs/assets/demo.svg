<text x="106" y="130" fill="#c9d1d9" font-size="14" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700">You type</text>
<text x="106" y="152" fill="#c9d1d9" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"><tspan fill="#c9d1d9" xml:space="preserve">the checkout page is slow, make it faster</tspan></text>
